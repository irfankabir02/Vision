name: Secrets Gate

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@6c64db94d5b2e09d7e0948fb6bd3166cc6fffbc7
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || format('{0}~1', github.sha) }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

      - name: Block tracked env files
        run: |
          tracked_env=$(git ls-files | grep -E '(^|/)\.env($|\.)' || true)
          if [ -n "$tracked_env" ]; then
            echo "::error::Tracked env file detected:"
            echo "$tracked_env"
            exit 1
          fi
